name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yml

  build-and-publish:
    name: Build, Release & Publish
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment:
      name: npm
      url: https://www.npmjs.com/package/@simprints/simface-sdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Compute version
        id: version
        run: |
          MAJOR=$(node -p "require('./package.json')['simprints:releaseMajorVersion']")
          VERSION="${MAJOR}.${{ github.run_number }}.${{ github.run_attempt }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set package version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Install and build
        run: |
          npm install
          npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/simface-sdk.js
            dist/simface-sdk.umd.cjs

      - name: Publish to npm
        run: npm publish --access public
        env:
          NPM_CONFIG_PROVENANCE: false

  deploy-demo:
    name: Deploy Demo to GitHub Pages
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build SDK
        run: |
          npm install
          npm run build

      - name: Build demo
        run: |
          cd demo
          npm install
          npm run build
        env:
          VITE_BASE_PATH: /LegoDay-Simprints-IDV-Frontend/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
