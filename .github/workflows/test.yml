name: Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

jobs:
  frontend-test:
    name: Frontend and Demo Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Run frontend tests
        run: npm test

      - name: Build SDK
        run: npm run build

      - name: Install demo dependencies
        working-directory: demo
        run: npm install

      - name: Build demo
        working-directory: demo
        run: npm run build
